name: Beta Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            # Pinned to windows-2022 (VS2022): windows-latest is being redirected to
            # windows-2025-vs2026 (VS2026) which node-gyp ≤12.3 does not recognise,
            # causing electron-builder's internal npmRebuild to fail on better-sqlite3.
            # Revisit when node-gyp ships VS2026 support (upstream PR #3240).
            os: windows-2022
          - name: Linux
            os: ubuntu-latest
    env:
      # Signing and notarization are enabled when the Apple/Windows secrets are configured.
      # Public beta builds run unsigned when the secrets are absent.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      OPENPI_RELEASE_CHANNEL: beta
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build app
        run: npm run build

      - name: Cache electron-builder tools
        uses: actions/cache@v4
        with:
          # electron-builder downloads NSIS, 7zip, and other tools to a platform cache dir.
          # Caching prevents re-downloads on every run and avoids transient network failures.
          path: |
            ~/.cache/electron-builder
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Package installers
        # Unsigned beta build. To enable macOS notarization, add repository secrets:
        # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID, CSC_LINK (base64 .p12),
        # CSC_KEY_PASSWORD — and replace this step with a conditional signing env block.
        # Do NOT pass CSC_LINK/APPLE_ID as empty env vars: electron-builder treats any
        # non-unset CSC_LINK as "certificate configured" and fails signing on empty values.
        run: npx electron-builder --config electron-builder.json --publish never

      - name: Verify packaged artifacts (minimum size checks)
        shell: bash
        run: |
          set -e
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          RELEASE_DIR="release/${VERSION}"

          echo "=== Verifying packaged artifacts in $RELEASE_DIR ==="

          MIN_BYTES=1048576  # 1 MB minimum — guards against empty/truncated output

          fail=0
          while IFS= read -r -d '' artifact; do
            size=$(wc -c < "$artifact")
            if [ "$size" -lt "$MIN_BYTES" ]; then
              echo "FAIL: $artifact is only ${size} bytes (expected >= ${MIN_BYTES})"
              fail=1
            else
              echo "OK:   $artifact (${size} bytes)"
            fi
          done < <(find "$RELEASE_DIR" -maxdepth 1 \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.exe" \) \
            -print0 2>/dev/null || true)

          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more packaged artifacts failed the minimum-size check."
            exit 1
          fi

          echo "All artifacts passed minimum-size verification."

      - name: Generate per-platform checksums
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          RELEASE_DIR="release/${VERSION}"

          if [ ! -d "$RELEASE_DIR" ]; then
            echo "No release directory found — nothing to checksum."
            exit 0
          fi

          CHECKSUMS_FILE="$RELEASE_DIR/checksums-${{ matrix.name }}.txt"
          echo "# SHA-256 checksums for OpenPi ${{ github.ref_name }} (${{ matrix.name }})" > "$CHECKSUMS_FILE"
          echo "# Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$CHECKSUMS_FILE"
          echo "" >> "$CHECKSUMS_FILE"

          find "$RELEASE_DIR" -maxdepth 1 \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.exe" \) \
            | sort | while IFS= read -r f; do
            if command -v sha256sum &>/dev/null; then
              sha256sum "$f" | sed "s|$RELEASE_DIR/||" >> "$CHECKSUMS_FILE"
            elif command -v shasum &>/dev/null; then
              shasum -a 256 "$f" | sed "s|$RELEASE_DIR/||" >> "$CHECKSUMS_FILE"
            fi
          done

          echo "=== Checksums ==="
          cat "$CHECKSUMS_FILE"

      - name: Upload installers
        uses: actions/upload-artifact@v5
        with:
          name: openpi-${{ matrix.name }}-${{ github.ref_name }}
          path: |
            release/**/OpenPi*.dmg
            release/**/*.AppImage
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest*.yml
            release/**/checksums-*.txt
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    env:
      BREW_TAP_TOKEN: ${{ secrets.BREW_TAP_TOKEN }}
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v5

      - name: Generate release notes from changelog
        run: node scripts/extract-release-notes.mjs "${{ github.ref_name }}" release-notes.generated.md

      - name: Download installers
        uses: actions/download-artifact@v5
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Merge platform checksums into combined checksums.txt
        run: |
          COMBINED="dist-artifacts/checksums.txt"
          echo "# SHA-256 checksums for OpenPi ${{ github.ref_name }}" > "$COMBINED"
          echo "# Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$COMBINED"
          echo "" >> "$COMBINED"
          for f in dist-artifacts/checksums-*.txt; do
            [ -f "$f" ] || continue
            echo "## $(basename "$f")" >> "$COMBINED"
            grep -v '^#' "$f" >> "$COMBINED" || true
            echo "" >> "$COMBINED"
          done
          echo "=== Combined checksums.txt ==="
          cat "$COMBINED"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2.2.1
        with:
          name: OpenPi ${{ github.ref_name }}
          body_path: release-notes.generated.md
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
          files: |
            dist-artifacts/**

      - name: Update Homebrew tap
        if: ${{ env.BREW_TAP_TOKEN != '' }}
        run: |
          DMG=$(find dist-artifacts -name "*-arm64.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "No arm64 DMG found in dist-artifacts — skipping Homebrew tap update"
            exit 0
          fi
          echo "Updating Homebrew tap with $DMG"
          node scripts/update-brew.mjs "${{ github.ref_name }}" "$DMG"

      - name: Verify Homebrew tap reflects new version
        if: ${{ env.BREW_TAP_TOKEN != '' }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Verifying tap has version $VERSION..."
          TAP_CONTENT=$(curl -sL \
            -H "Authorization: Bearer $BREW_TAP_TOKEN" \
            "https://api.github.com/repos/heyhuynhgiabuu/homebrew-openpi/contents/Casks/openpi.rb" \
            | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['content']).decode())")
          if echo "$TAP_CONTENT" | grep -q "version \"$VERSION\""; then
            echo "✓ Homebrew tap correctly reflects version $VERSION"
          else
            echo "::warning::Homebrew tap does not appear to reflect version $VERSION — manual update may be needed"
            echo "$TAP_CONTENT"
          fi
