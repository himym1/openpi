name: Beta Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
          - name: Linux
            os: ubuntu-latest
    env:
      # Public beta builds remain unsigned unless signing/notarization secrets are configured.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      OPENPI_RELEASE_CHANNEL: beta
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package installers
        run: npx electron-builder --config electron-builder.json --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v5
        with:
          name: openpi-${{ matrix.name }}-${{ github.ref_name }}
          path: |
            release/**/OpenPi*.dmg
            release/**/*.AppImage
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v5

      - name: Generate release notes from changelog
        run: node scripts/extract-release-notes.mjs "${{ github.ref_name }}" release-notes.generated.md

      - name: Download installers
        uses: actions/download-artifact@v5
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: OpenPi ${{ github.ref_name }}
          body_path: release-notes.generated.md
          draft: false
          prerelease: true
          files: dist-artifacts/**/*
